<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#172219">
  <meta name="description" content="种植建造像素游戏">
  <title>Zhong Zhi Jian Zao · 种植建造</title>
  <style>
    @font-face {
      font-family: "Ark Pixel Web";
      src: url("Fonts/ark-pixel-12px-latin.woff2") format("woff2");
      unicode-range: U+0000-00FF, U+2000-206F, U+20AC, U+2122, U+2190-21FF;
      font-display: swap;
    }

    @font-face {
      font-family: "Ark Pixel Web";
      src: url("Fonts/ark-pixel-12px-zh_cn.woff2") format("woff2");
      unicode-range: U+2E80-9FFF, U+3000-303F, U+FF00-FFEF;
      font-display: swap;
    }

    :root {
      color-scheme: dark;
      --ink: #fff3bf;
      --muted: #d8e8c2;
      --panel: rgba(27, 43, 29, 0.94);
      --line: #a9d86e;
      --accent: #f2d36f;
      --shadow: #142118;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #172219;
      color: var(--ink);
      font-family: "Ark Pixel Web", "PingFang SC", "Microsoft YaHei", sans-serif;
      font-synthesis: none;
      -webkit-font-smoothing: none;
      -moz-osx-font-smoothing: grayscale;
    }

    button {
      font: inherit;
    }

    #game-shell {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      background: #263529;
    }

    #unity-canvas {
      display: block;
      width: 100%;
      height: 100%;
      background: #263529;
      outline: none;
      image-rendering: pixelated;
    }

    #menu,
    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      justify-content: center;
      padding: 24px;
    }

    #menu {
      z-index: 6;
      background: linear-gradient(to bottom, #6cc3ea 0%, #c3efff 56%, #8bd47e 56%, #6abe5c 100%);
      align-items: center;
      padding-top: 24px;
      padding-bottom: 24px;
      transition: opacity 180ms steps(3, end);
    }

    #menu::before {
      position: absolute;
      top: 8%;
      left: 10%;
      width: 84px;
      height: 24px;
      content: "";
      background: #ffffff;
      box-shadow:
        12px -12px 0 #ffffff,
        24px -12px 0 #ffffff,
        36px 0 0 #ffffff,
        48px 0 0 #ffffff,
        60px 12px 0 #ffffff;
      opacity: 0.86;
    }

    #menu::after {
      position: absolute;
      right: 0;
      bottom: 0;
      left: 0;
      z-index: 0;
      height: 38%;
      content: "";
      background: #62c457;
      box-shadow: inset 0 6px 0 rgba(31, 120, 49, 0.32), inset 0 12px 0 rgba(137, 220, 113, 0.35);
    }

    .menu-scene {
      position: absolute;
      right: 0;
      bottom: 0;
      left: 0;
      z-index: 1;
      height: 38%;
      overflow: hidden;
      pointer-events: none;
      background: url("grass-preview.png") repeat;
      background-size: 12px 12px;
      animation: grass-scroll 2.4s steps(12, end) infinite;
    }

    .menu-cloud {
      position: absolute;
      z-index: 0;
      width: 92px;
      height: 20px;
      background: #ffffff;
      box-shadow: 12px -10px 0 #ffffff, 24px -10px 0 #ffffff, 36px 0 0 #ffffff;
      opacity: 0.72;
      pointer-events: none;
    }

    .menu-cloud.cloud-two { top: 23%; right: 13%; transform: scale(0.72); }

    @keyframes grass-scroll {
      from { background-position: 0 0; }
      to { background-position: -96px 0; }
    }

    .menu-character {
      position: absolute;
      bottom: 14%;
      left: 50%;
      width: 48px;
      height: 62px;
      image-rendering: pixelated;
      transform-origin: center bottom;
      transform: translateX(-50%);
      animation: menu-player-motion 420ms ease-in-out infinite;
    }

    .menu-player {
      position: absolute;
      bottom: 7px;
      left: 0;
      width: 48px;
      height: 48px;
      background: url("player-preview.png") center / 48px 48px no-repeat;
      image-rendering: pixelated;
    }

    @keyframes menu-player-motion {
      0% { transform: translateX(-50%) translateY(0) rotate(0deg); }
      25% { transform: translateX(-50%) translateY(-3px) rotate(3deg); }
      50% { transform: translateX(-50%) translateY(-6px) rotate(0deg); }
      75% { transform: translateX(-50%) translateY(-3px) rotate(-3deg); }
      100% { transform: translateX(-50%) translateY(0) rotate(0deg); }
    }

    #menu.hidden {
      visibility: hidden;
      pointer-events: none;
      opacity: 0;
    }

    .menu-card {
      position: relative;
      z-index: 2;
      display: flex;
      width: min(560px, 92vw);
      flex-direction: column;
      align-items: center;
      gap: 30px;
      padding: 24px;
      text-align: center;
    }

    .menu-kicker {
      margin-bottom: 14px;
      color: var(--accent);
      font-size: 12px;
      letter-spacing: 0.18em;
    }

    .menu-card h1 {
      margin: 0;
      color: var(--ink);
      font-size: clamp(38px, 8vw, 68px);
      font-weight: 400;
      line-height: 1;
      letter-spacing: 0.08em;
      text-shadow: 4px 4px 0 #25492a;
    }

    .title-motion {
      transform-origin: center top;
      animation: title-drop 2.1s cubic-bezier(0.16, 1, 0.3, 1.18) 0.85s both;
    }

    .title-motion h1 {
      transform-origin: center bottom;
      animation: title-sway 3.8s ease-in-out 2.75s infinite;
    }

    @keyframes title-drop {
      /* Keep the title upright and still while it falls; only the vertical
         landing bounce moves it.  The gentle sway starts after this animation. */
      0% { opacity: 0; transform: translateY(-70vh) rotate(0deg) scale(1); }
      48% { opacity: 1; transform: translateY(30px) rotate(0deg) scale(1); }
      64% { transform: translateY(-15px) rotate(0deg) scale(1); }
      78% { transform: translateY(8px) rotate(0deg) scale(1); }
      90% { transform: translateY(-4px) rotate(0deg) scale(1); }
      100% { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); }
    }

    @keyframes title-sway {
      0% { transform: rotate(0deg) scale(1); }
      25% { transform: rotate(2.5deg) scale(1.05); }
      50% { transform: rotate(0deg) scale(1); }
      75% { transform: rotate(-2.5deg) scale(1.05); }
      100% { transform: rotate(0deg) scale(1); }
    }

    .menu-subtitle {
      margin: 12px 0 18px;
      color: var(--muted);
      font-size: 18px;
      letter-spacing: 0.26em;
    }

    .menu-description {
      max-width: 360px;
      margin: 0 auto 22px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.7;
      letter-spacing: 0.04em;
    }

    .menu-tags {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin: 0 auto 24px;
    }

    .menu-tag {
      border: 2px solid rgba(169, 216, 110, 0.48);
      padding: 6px 10px 4px;
      color: #e3efbd;
      background: rgba(62, 107, 57, 0.55);
      font-size: 12px;
    }

    .pixel-button {
      min-width: 210px;
      border: 3px solid #19351f;
      padding: 13px 28px 11px;
      background: var(--accent);
      color: #20321f;
      font-size: 22px;
      cursor: pointer;
      box-shadow:
        0 5px 0 #876f30,
        inset 0 0 0 2px rgba(255, 251, 194, 0.62);
    }

    .pixel-button:hover {
      transform: translateY(-2px);
      box-shadow:
        0 7px 0 #876f30,
        inset 0 0 0 2px rgba(255, 251, 194, 0.62);
    }

    .pixel-button:active {
      transform: translateY(4px);
      box-shadow:
        0 1px 0 #876f30,
        inset 0 0 0 2px rgba(255, 251, 194, 0.62);
    }

    .controls {
      margin-top: 22px;
      color: #d7e8c2;
      font-size: 13px;
      line-height: 1.8;
    }

    .menu-tip {
      margin-top: 12px;
      color: #9fbd8c;
      font-size: 11px;
      letter-spacing: 0.08em;
    }

    #unity-splash {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      background: #172219;
      color: #ffffff;
      pointer-events: none;
      animation: unity-splash-hide 360ms steps(4, end) 1.05s forwards;
    }

    .unity-splash-content {
      display: grid;
      justify-items: center;
      gap: 12px;
    }

    .unity-mark {
      position: relative;
      width: 58px;
      height: 58px;
      border: 7px solid #ffffff;
      transform: rotate(45deg);
      box-shadow: inset 0 0 0 5px #172219;
    }

    .unity-mark::before,
    .unity-mark::after {
      position: absolute;
      content: "";
      background: #172219;
    }

    .unity-mark::before {
      top: 19px;
      left: -11px;
      width: 66px;
      height: 7px;
    }

    .unity-mark::after {
      top: -11px;
      left: 19px;
      width: 7px;
      height: 66px;
    }

    .unity-word {
      font-size: 20px;
      letter-spacing: 0.24em;
    }

    @keyframes unity-splash-hide {
      to { visibility: hidden; opacity: 0; }
    }

    #loading {
      z-index: 5;
      visibility: hidden;
      gap: 14px;
      align-content: center;
      background: #1d2c20;
      text-align: center;
      opacity: 0;
      transition: opacity 180ms steps(3, end);
    }

    #loading.active {
      visibility: visible;
      opacity: 1;
    }

    #loading.done {
      visibility: hidden;
      pointer-events: none;
      opacity: 0;
    }

    .loading-title {
      font-size: 26px;
      letter-spacing: 0.14em;
    }

    .track {
      overflow: hidden;
      width: min(330px, 72vw);
      height: 10px;
      border: 3px solid #101b13;
      background: #344d36;
    }

    #progress {
      width: 0;
      height: 100%;
      background: var(--accent);
      transition: width 100ms steps(10, end);
    }

    #status {
      color: var(--muted);
      font-size: 13px;
    }

    #coin-display {
      position: absolute;
      top: 28px;
      right: 18px;
      z-index: 5;
      display: none;
      min-width: 0;
      min-height: 36px;
      border: 0;
      padding: 0;
      background: transparent;
      color: var(--accent);
      font-size: 21px;
      line-height: 34px;
      text-align: center;
      text-shadow: 2px 2px 0 #172219;
      align-items: center;
      justify-content: center;
      gap: 7px;
    }

    #coin-display.visible {
      display: flex;
    }

    .coin-sprite {
      display: inline-block;
      width: 36px;
      height: 36px;
      flex: 0 0 36px;
      background-image: url("shop-materials.png");
      background-repeat: no-repeat;
      background-size: 800% 400%;
      background-position: 85.7143% 0% !important;
      image-rendering: pixelated;
      vertical-align: middle;
    }

    .coin-small {
      width: 22px;
      height: 22px;
      flex-basis: 22px;
      background-size: 800% 400%;
    }

    #coin-display > .coin-sprite {
      transform: translateY(2px);
    }

    .coin-label,
    .coin-separator {
      line-height: 34px;
    }

    .price {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      color: #38552f;
    }

    #hotkey-hud,
    #hotkey-feedback {
      position: absolute;
      z-index: 5;
      display: none;
      color: var(--muted);
      font-size: 14px;
      text-shadow: 2px 2px 0 #172219;
      pointer-events: none;
    }

    #hotkey-hud {
      bottom: 18px;
      left: 18px;
    }

    #hotkey-feedback {
      top: 76px;
      left: 50%;
      transform: translateX(-50%);
      color: var(--accent);
      font-size: 18px;
    }

    #hotkey-hud.visible,
    #hotkey-feedback.visible {
      display: block;
    }

    #utility-panel {
      position: absolute;
      top: 50%;
      left: 50%;
      z-index: 10;
      display: none;
      width: min(860px, calc(100vw - 48px));
      min-height: 480px;
      max-height: calc(100vh - 56px);
      overflow-y: auto;
      transform: translate(-50%, -50%);
      border: 5px solid #b0a77c;
      padding: 24px;
      background: #3c3c3c;
      box-shadow: inset 0 0 0 4px #191919, 0 8px 0 #151515;
      color: var(--muted);
      text-align: center;
    }

    #utility-panel.visible {
      display: block;
    }

    #utility-panel.shop-screen {
      top: 0;
      left: 0;
      z-index: 20;
      display: block;
      width: 100vw;
      min-height: 100vh;
      max-height: none;
      overflow-y: auto;
      transform: translateX(-100%);
      border: 0;
      padding: clamp(28px, 6vh, 72px) clamp(22px, 8vw, 120px);
      background: rgba(27, 43, 29, 0.98);
      box-shadow: none;
      text-align: left;
      transition: transform 360ms cubic-bezier(0.22, 0.8, 0.28, 1);
    }

    #utility-panel.shop-screen.visible {
      transform: translateX(0);
    }

    #utility-panel.shop-screen #utility-title-row {
      max-width: 1100px;
      margin: 0 auto 28px;
      padding: 0;
    }

    #utility-panel.shop-screen #shop-view {
      max-width: 1100px;
      margin: 0 auto;
    }

    #utility-panel.shop-screen .shop-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 24px;
    }

    #shop-toggle {
      position: absolute;
      top: 50%;
      left: 10px;
      z-index: 7;
      display: none;
      align-items: center;
      justify-content: center;
      min-width: 78px;
      min-height: 50px;
      transform: translateY(-50%);
      border: 3px solid #19351f;
      padding: 10px 14px 8px;
      background: var(--accent);
      color: #20321f;
      font: inherit;
      font-size: 20px;
      cursor: pointer;
      box-shadow: 4px 4px 0 rgba(20, 33, 24, 0.72);
    }

    #shop-toggle.visible {
      display: flex;
    }

    #shop-toggle:hover {
      background: #ffe994;
    }

    #utility-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 22px;
      padding: 0 8px;
    }

    #utility-title {
      color: var(--ink);
      font-size: 32px;
    }

    #utility-close {
      border: 2px solid #1b1b1b;
      width: 44px;
      height: 42px;
      padding: 0;
      background: #696969;
      color: #ffffff;
      font: inherit;
      font-size: 28px;
      line-height: 34px;
      cursor: pointer;
    }

    #utility-close:hover {
      background: #8a8a8a;
    }

    #inventory-view,
    #shop-view {
      font-size: 18px;
      line-height: 2.1;
    }

    .inventory-grid,
    .hotbar-grid {
      display: grid;
      grid-template-columns: repeat(9, minmax(0, 1fr));
      gap: 4px;
      margin: 0 auto;
      max-width: 720px;
    }

    #persistent-hotbar {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 5;
      display: none;
      grid-template-columns: repeat(9, 48px);
      gap: 5px;
      padding: 5px;
      background: rgba(27, 27, 27, 0.82);
    }

    #persistent-hotbar.visible {
      display: grid;
    }

    #persistent-hotbar .inventory-slot {
      width: 48px;
      min-height: 48px;
      aspect-ratio: 1;
      font-size: 18px;
    }

    #persistent-hotbar .inventory-slot.selected {
      border-color: #fff2a8;
      box-shadow: inset 2px 2px 0 #fff2a8, inset -2px -2px 0 #b69a42;
    }

    #persistent-hotbar {
      gap: 8px;
      padding: 0;
      background: transparent;
    }

    #persistent-hotbar .inventory-slot,
    #persistent-hotbar .inventory-slot.filled {
      border: 2px solid #1b1b1b;
      background: #777777;
      box-shadow: inset 2px 2px 0 #a1a1a1, inset -2px -2px 0 #4b4b4b;
    }

    #persistent-hotbar .inventory-slot.selected {
      border-color: #fff2a8;
      box-shadow: inset 2px 2px 0 #fff2a8, inset -2px -2px 0 #b69a42;
    }

    .inventory-slot {
      position: relative;
      display: grid;
      aspect-ratio: 1;
      place-items: center;
      min-height: 58px;
      border: 3px solid #1b1b1b;
      background: #777777;
      box-shadow: inset 2px 2px 0 #a1a1a1, inset -2px -2px 0 #4b4b4b;
      color: #ffffff;
      font-size: 22px;
    }

    .inventory-slot.filled {
      background: #5a5a5a;
    }

    .slot-icon {
      display: block;
      width: 34px;
      height: 34px;
      background-image: url("shop-materials.png");
      background-repeat: no-repeat;
      background-size: 800% 400%;
      image-rendering: pixelated;
      font-size: 0;
    }

    .sprite-r0-c0 { background-position: 0% 0% !important; }
    .sprite-r0-c1 { background-position: 14.2857% 0% !important; }
    .sprite-r0-c2 { background-position: 28.5714% 0% !important; }
    .sprite-r0-c3 { background-position: 42.8571% 0% !important; }
    .sprite-r0-c4 { background-position: 57.1429% 0% !important; }
    .sprite-r0-c5 { background-position: 71.4286% 0% !important; }
    .sprite-r0-c6 { background-position: 85.7143% 0% !important; }
    .sprite-r1-c0 { background-position: 0% 33.3333% !important; }
    .sprite-r1-c1 { background-position: 14.2857% 33.3333% !important; }
    .sprite-r1-c2 { background-position: 28.5714% 33.3333% !important; }
    .sprite-r1-c3 { background-position: 42.8571% 33.3333% !important; }
    .sprite-r1-c4 { background-position: 57.1429% 33.3333% !important; }
    .sprite-r1-c5 { background-position: 71.4286% 33.3333% !important; }
    .sprite-r2-c0 { background-position: 0% 66.6667% !important; }
    .sprite-r2-c1 { background-position: 14.2857% 66.6667% !important; }

    .slot-count {
      position: absolute;
      right: 3px;
      bottom: 0;
      color: #ffffff;
      font-size: 16px;
      text-shadow: 2px 2px 0 #222222;
    }

    .hotbar-label,
    .inventory-tip {
      margin: 18px 0 8px;
      color: #d0d0d0;
      font-size: 16px;
    }

    .inventory-tip {
      margin: 18px 0 0;
    }

    .shop-intro {
      margin: -8px 0 18px;
      color: #d9dfc7;
      font-size: 17px;
    }

    .shop-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    #shop-view {
      display: none;
    }

    #shop-view.visible {
      display: grid;
      gap: 8px;
    }

    .shop-button {
      display: flex;
      min-height: 106px;
      align-items: center;
      gap: 16px;
      border: 3px solid #19351f;
      padding: 14px 18px;
      background: var(--accent);
      color: #20321f;
      font: inherit;
      font-size: 20px;
      text-align: left;
      cursor: pointer;
    }

    .shop-button:hover {
      background: #ffe994;
    }

    .shop-button:active {
      transform: translateY(2px);
    }

    .shop-icon {
      display: grid;
      width: 58px;
      height: 58px;
      flex: 0 0 58px;
      place-items: center;
      border: 3px solid #3a4c2a;
      background: #6f8e46;
      background-image: url("shop-materials.png");
      background-repeat: no-repeat;
      background-size: 800% 400%;
      image-rendering: pixelated;
      color: transparent;
      font-size: 0;
      text-align: center;
    }

    .shop-copy {
      display: grid;
      gap: 2px;
    }

    .shop-copy small {
      color: #38552f;
      font-size: 14px;
      line-height: 1.45;
    }

    #banner {
      position: absolute;
      top: 14px;
      left: 50%;
      z-index: 8;
      display: none;
      max-width: min(560px, 88vw);
      transform: translateX(-50%);
      border: 3px solid #793e3e;
      padding: 10px 14px;
      background: #4f2929;
      color: #ffd5c7;
      font-size: 13px;
      text-align: center;
    }

    @media (max-width: 600px) {
      #utility-panel.shop-screen {
        padding: 24px 14px;
      }

      #utility-panel.shop-screen .shop-grid {
        grid-template-columns: 1fr;
        gap: 12px;
      }

      #shop-toggle {
        left: 6px;
        min-width: 66px;
        min-height: 44px;
        padding: 8px 10px 6px;
        font-size: 17px;
      }

      #coin-display {
        top: 20px;
        right: 12px;
        min-width: 0;
        min-height: 32px;
        padding: 0;
        font-size: 17px;
        line-height: 28px;
        gap: 6px;
      }

      #coin-display .coin-sprite {
        width: 30px;
        height: 30px;
        flex-basis: 30px;
      }

      #coin-display .coin-small {
        width: 20px;
        height: 20px;
        flex-basis: 20px;
      }

      #persistent-hotbar {
        top: 10px;
        left: 8px;
        grid-template-columns: repeat(9, 30px);
        gap: 2px;
        padding: 3px;
      }

      #persistent-hotbar .inventory-slot {
        width: 30px;
        min-height: 30px;
        font-size: 13px;
      }

      #persistent-hotbar .slot-icon {
        font-size: 18px;
      }

      #persistent-hotbar .slot-count {
        font-size: 10px;
      }

      #utility-panel {
        width: calc(100vw - 20px);
        min-height: 0;
        max-height: calc(100vh - 20px);
        padding: 14px;
      }

      #utility-title {
        font-size: 25px;
      }

      .inventory-grid,
      .hotbar-grid {
        gap: 3px;
      }

      .inventory-slot {
        min-height: 32px;
        border-width: 2px;
        font-size: 15px;
      }

      .slot-icon {
        font-size: 19px;
      }

      .slot-count {
        font-size: 11px;
      }

      .shop-grid {
        grid-template-columns: 1fr;
      }

      .shop-button {
        min-height: 78px;
        padding: 10px 12px;
        font-size: 17px;
      }

      .shop-icon {
        width: 44px;
        height: 44px;
        flex-basis: 44px;
        font-size: 22px;
      }

      .menu-card {
        padding: 34px 18px 26px;
      }

      .menu-card h1 {
        font-size: clamp(34px, 12vw, 52px);
      }

      .menu-subtitle {
        font-size: 15px;
      }

      .controls {
        font-size: 11px;
      }
    }
  </style>
</head>
<body>
  <main id="game-shell">
    <canvas id="unity-canvas" tabindex="-1"></canvas>

    <div id="unity-splash" aria-label="Unity">
      <div class="unity-splash-content">
        <div class="unity-mark" aria-hidden="true"></div>
        <div class="unity-word">UNITY</div>
      </div>
    </div>

    <section id="menu" aria-label="主界面">
      <div class="menu-cloud cloud-two" aria-hidden="true"></div>
      <div class="menu-scene" aria-hidden="true">
        <div class="menu-character">
          <div class="menu-player"></div>
        </div>
      </div>
      <div class="menu-card">
        <div class="title-motion"><h1>种植建造</h1></div>
        <button id="start-game" class="pixel-button" type="button">开始游戏</button>
      </div>
    </section>

    <section id="loading" aria-live="polite">
      <div class="loading-title">载入世界</div>
      <div class="track"><div id="progress"></div></div>
      <div id="status">准备中…</div>
    </section>

    <div id="coin-display" aria-live="polite"><span class="coin-sprite"></span><span class="coin-separator">:</span><span id="coin-amount">100</span></div>
    <div id="persistent-hotbar" aria-label="快捷栏"></div>
    <button id="shop-toggle" type="button" aria-label="打开商店">商店</button>
    <div id="hotkey-hud">E 背包 · I 商店 · 右键互动</div>
    <div id="hotkey-feedback" aria-live="polite"></div>
    <section id="utility-panel" aria-label="背包和商店">
      <div id="utility-title-row">
        <div id="utility-title">背包</div>
        <button id="utility-close" type="button" aria-label="关闭">×</button>
      </div>
      <div id="inventory-view">
        <div class="inventory-grid" id="inventory-grid"></div>
        <div class="hotbar-label">快捷栏</div>
        <div class="hotbar-grid" id="hotbar-grid"></div>
        <div class="inventory-tip">按 E 或 Esc 关闭 · 数字键 1–9 选择快捷栏</div>
      </div>
      <div id="shop-view">
        <div class="shop-intro">用金币购买种子和农场用品，商品会进入背包与左上角快捷栏。</div>
        <div class="shop-grid">
          <button class="shop-button" data-item="wheat_seed" data-price="5" data-label="小麦种子">
            <span class="shop-icon sprite-r0-c0"></span><span class="shop-copy"><strong>小麦种子</strong><small>种下后可收获小麦 · <span class="price"><span class="coin-sprite coin-small"></span>5</span></small></span>
          </button>
          <button class="shop-button" data-item="carrot_seed" data-price="8" data-label="胡萝卜种子">
            <span class="shop-icon sprite-r0-c1"></span><span class="shop-copy"><strong>胡萝卜种子</strong><small>种下后可收获胡萝卜 · <span class="price"><span class="coin-sprite coin-small"></span>8</span></small></span>
          </button>
          <button class="shop-button" data-item="fertilizer" data-price="12" data-label="肥料">
            <span class="shop-icon sprite-r0-c2"></span><span class="shop-copy"><strong>肥料</strong><small>提高耕地品质 · <span class="price"><span class="coin-sprite coin-small"></span>12</span></small></span>
          </button>
          <button class="shop-button" data-item="wood" data-price="15" data-label="木材">
            <span class="shop-icon sprite-r0-c3"></span><span class="shop-copy"><strong>木材</strong><small>建造系统的基础材料 · <span class="price"><span class="coin-sprite coin-small"></span>15</span></small></span>
          </button>
        </div>
      </div>
    </section>
    <div id="banner" role="alert"></div>
  </main>

  <script>
    const gameShell = document.querySelector("#game-shell");
    const canvas = document.querySelector("#unity-canvas");
    const menu = document.querySelector("#menu");
    const startGame = document.querySelector("#start-game");
    const loading = document.querySelector("#loading");
    const progress = document.querySelector("#progress");
    const status = document.querySelector("#status");
    const banner = document.querySelector("#banner");
    const coinDisplay = document.querySelector("#coin-display");
    const coinAmountLabel = document.querySelector("#coin-amount");
    const persistentHotbar = document.querySelector("#persistent-hotbar");
    const shopToggle = document.querySelector("#shop-toggle");
    const hotkeyHud = document.querySelector("#hotkey-hud");
    const hotkeyFeedback = document.querySelector("#hotkey-feedback");
    const utilityPanel = document.querySelector("#utility-panel");
    const utilityTitle = document.querySelector("#utility-title");
    const utilityClose = document.querySelector("#utility-close");
    const inventoryView = document.querySelector("#inventory-view");
    const inventoryGrid = document.querySelector("#inventory-grid");
    const hotbarGrid = document.querySelector("#hotbar-grid");
    const shopView = document.querySelector("#shop-view");
    let utilityMode = null;
    let selectedHotbarIndex = 0;
    let coinAmount = 100;
    const hotbarItemIds = ["wheat_seed", "carrot_seed", "fertilizer", "wood"];
    const shopInventory = {
      wheat_seed: 0,
      carrot_seed: 0,
      fertilizer: 0,
      wood: 0
    };
    let hotkeyFeedbackTimer;

    function showHotkeyFeedback(message) {
      hotkeyFeedback.textContent = message;
      hotkeyFeedback.classList.add("visible");
      clearTimeout(hotkeyFeedbackTimer);
      hotkeyFeedbackTimer = setTimeout(() => hotkeyFeedback.classList.remove("visible"), 1200);
    }

    window.setCoinDisplay = value => {
      const amount = Number(value);
      coinAmount = Number.isFinite(amount) ? amount : 0;
      coinAmountLabel.textContent = coinAmount.toLocaleString("zh-CN");
      if (gameReady) coinDisplay.classList.add("visible");
      updateInventory();
    };

    window.setShopItemCount = (itemId, count) => {
      if (Object.prototype.hasOwnProperty.call(shopInventory, itemId)) {
        shopInventory[itemId] = Math.max(0, Number(count) || 0);
        updateInventory();
      }
    };

    window.notifyFarmingFeedback = message => showHotkeyFeedback(message);
    window.notifyHarvest = (itemId, coins) => {
      const label = itemId === "carrot_seed" ? "胡萝卜" : "小麦";
      showHotkeyFeedback("收获" + label + "  +" + Number(coins || 0) + "金币");
    };

    function updateInventory() {
      const items = [
        { sprite: "sprite-r0-c0", count: shopInventory.wheat_seed },
        { sprite: "sprite-r0-c1", count: shopInventory.carrot_seed },
        { sprite: "sprite-r0-c2", count: shopInventory.fertilizer },
        { sprite: "sprite-r0-c3", count: shopInventory.wood }
      ];
      const slots = items.map(item => item.count > 0
        ? "<div class=\"inventory-slot filled\"><span class=\"slot-icon " + item.sprite + "\"></span>" +
          "<span class=\"slot-count\">" + item.count + "</span></div>"
        : "<div class=\"inventory-slot\"></div>");
      while (slots.length < 27) slots.push("<div class=\"inventory-slot\"></div>");
      inventoryGrid.innerHTML = slots.join("");
      const hotbarMarkup = Array.from({ length: 9 }, (_, index) =>
        "<div class=\"inventory-slot " + (index === selectedHotbarIndex ? "selected" : "") + "\">" +
        (index < items.length && items[index].count > 0
          ? "<span class=\"slot-icon " + items[index].sprite + "\"></span><span class=\"slot-count\">" + items[index].count + "</span>"
          : "") +
        "</div>").join("");
      hotbarGrid.innerHTML = hotbarMarkup;
      persistentHotbar.innerHTML = hotbarMarkup;
    }

    function openUtility(mode) {
      utilityMode = mode;
      const isShop = mode === "shop";
      utilityTitle.textContent = isShop ? "商店" : "背包";
      inventoryView.style.display = isShop ? "none" : "block";
      shopView.classList.toggle("visible", isShop);
      updateInventory();
      setGameInputLocked(true);

      if (isShop) {
        utilityPanel.classList.add("shop-screen");
        utilityPanel.classList.remove("visible");
        requestAnimationFrame(() => utilityPanel.classList.add("visible"));
      } else {
        utilityPanel.classList.remove("shop-screen");
        utilityPanel.classList.add("visible");
      }
    }

    function closeUtility() {
      const isShop = utilityPanel.classList.contains("shop-screen");
      utilityPanel.classList.remove("visible");
      utilityMode = null;
      if (isShop) {
        window.setTimeout(() => {
          utilityPanel.classList.remove("shop-screen");
          setGameInputLocked(false);
        }, 380);
      } else {
        setGameInputLocked(false);
      }
    }

    function setGameInputLocked(locked) {
      if (unityInstance) {
        unityInstance.SendMessage("Player", "SetInputLocked", locked ? "true" : "false");
      }
      if (locked) {
        canvas.blur();
      } else {
        canvas.focus();
      }
    }

    utilityClose.addEventListener("click", closeUtility);
    shopToggle.addEventListener("click", () => openUtility("shop"));

    document.querySelectorAll("[data-item]").forEach(button => {
      button.addEventListener("click", () => {
        if (!unityInstance) {
          showHotkeyFeedback("世界还在载入");
          return;
        }

        const id = button.dataset.item;
        const price = Number(button.dataset.price);
        const label = button.dataset.label;
        if (coinAmount < price) {
          showHotkeyFeedback("金币不足");
          return;
        }

        unityInstance.SendMessage("Cozy Farm Bootstrap", "BuyItem", id);
        showHotkeyFeedback("正在购买" + label);
        openUtility("shop");
      });
    });

    // 每次发布都更换版本号，避免 UnityCache/浏览器继续使用旧的同名构建文件。
    const buildUrl = "Build";
    const buildVersion = "20260724-shop15";
    const assetUrl = file => buildUrl + "/" + file + "?v=" + buildVersion;
    const loaderUrl = assetUrl("docs.loader.js");
    const config = {
      arguments: [],
      dataUrl: assetUrl("docs.data.unityweb"),
      frameworkUrl: assetUrl("docs.framework.js.unityweb"),
      codeUrl: assetUrl("docs.wasm.unityweb"),
      streamingAssetsUrl: "StreamingAssets",
      companyName: "Nornttyy",
      productName: "Zhong Zhi Jian Zao",
      productVersion: "0.1.0",
      devicePixelRatio: Math.min(window.devicePixelRatio || 1, 2),
      showBanner(message, type) {
        banner.textContent = message;
        banner.style.display = "block";
        if (type !== "error") setTimeout(() => banner.style.display = "none", 5000);
      }
    };

    let unityInstance;
    let bootStarted = false;
    let gameReady = false;

    function bootGame() {
      if (bootStarted) return;
      bootStarted = true;
      loading.classList.add("active");

      const loader = document.createElement("script");
      loader.src = loaderUrl;
      loader.onload = () => {
        createUnityInstance(canvas, config, value => {
          const percent = Math.round(value * 100);
          progress.style.width = percent + "%";
          status.textContent = "载入 " + percent + "%";
        }).then(instance => {
          unityInstance = instance;
          gameReady = true;
          loading.classList.add("done");
          coinDisplay.classList.add("visible");
          persistentHotbar.classList.add("visible");
          shopToggle.classList.add("visible");
          hotkeyHud.classList.add("visible");
          canvas.focus();
        }).catch(message => {
          banner.textContent = message;
          banner.style.display = "block";
          status.textContent = "载入失败";
        });
      };
      loader.onerror = () => {
        banner.textContent = "载入失败，请刷新重试";
        banner.style.display = "block";
        status.textContent = "载入失败";
      };
      document.body.appendChild(loader);
    }

    startGame.addEventListener("click", () => {
      menu.classList.add("hidden");
      bootGame();
    });

    document.addEventListener("keydown", event => {
      if (!menu.classList.contains("hidden")) return;
      if (!gameReady) {
        event.preventDefault();
        return;
      }
      const key = event.key.toLowerCase();
      if (utilityMode && key !== "e" && key !== "i" && event.key !== "Escape") {
        event.preventDefault();
        event.stopImmediatePropagation();
        return;
      }
      if (key === "e") {
        event.preventDefault();
        utilityMode === "inventory" ? closeUtility() : openUtility("inventory");
      }
      if (key === "i") {
        event.preventDefault();
        utilityMode === "shop" ? closeUtility() : openUtility("shop");
      }
      if (/^[1-9]$/.test(key)) {
        selectedHotbarIndex = Number(key) - 1;
        updateInventory();
        if (unityInstance && hotbarItemIds[selectedHotbarIndex]) {
          unityInstance.SendMessage(
            "Cozy Farm Bootstrap",
            "SelectHotbarItem",
            hotbarItemIds[selectedHotbarIndex]);
        }
      }
      if (event.key === "Escape") {
        event.preventDefault();
        closeUtility();
      }
    }, true);

    canvas.addEventListener("pointerdown", () => {
      if (!utilityMode) canvas.focus();
    });
    canvas.addEventListener("contextmenu", event => {
      event.preventDefault();
      if (gameReady && !utilityMode && menu.classList.contains("hidden")) showHotkeyFeedback("右键：互动 / 建造");
    });
  </script>
</body>
</html>
