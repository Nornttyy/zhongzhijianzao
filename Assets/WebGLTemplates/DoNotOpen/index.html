<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#172219">
  <meta name="description" content="种植建造像素游戏">
  <title>Zhong Zhi Jian Zao · 种植建造</title>
  <style>
    @font-face {
      font-family: "Ark Pixel Web";
      src: url("Fonts/ark-pixel-12px-latin.woff2") format("woff2");
      unicode-range: U+0000-00FF, U+2000-206F, U+20AC, U+2122, U+2190-21FF;
      font-display: swap;
    }

    @font-face {
      font-family: "Ark Pixel Web";
      src: url("Fonts/ark-pixel-12px-zh_cn.woff2") format("woff2");
      unicode-range: U+2E80-9FFF, U+3000-303F, U+FF00-FFEF;
      font-display: swap;
    }

    :root {
      color-scheme: dark;
      --ink: #fff3bf;
      --muted: #d8e8c2;
      --panel: rgba(27, 43, 29, 0.94);
      --line: #a9d86e;
      --accent: #f2d36f;
      --shadow: #142118;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #172219;
      color: var(--ink);
      font-family: "Ark Pixel Web", "PingFang SC", "Microsoft YaHei", sans-serif;
      font-synthesis: none;
      -webkit-font-smoothing: none;
      -moz-osx-font-smoothing: grayscale;
    }

    button {
      font: inherit;
    }

    #game-shell {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      background: #263529;
    }

    #unity-canvas {
      display: block;
      width: 100%;
      height: 100%;
      background: #263529;
      outline: none;
      image-rendering: pixelated;
    }

    #menu,
    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      justify-content: center;
      padding: 24px;
    }

    #menu {
      z-index: 6;
      background: linear-gradient(to bottom, #6cc3ea 0%, #c3efff 56%, #8bd47e 56%, #6abe5c 100%);
      align-items: flex-start;
      padding-top: clamp(20px, 5vh, 58px);
      padding-bottom: 34vh;
      transition: opacity 180ms steps(3, end);
    }

    #menu::before {
      position: absolute;
      top: 8%;
      left: 10%;
      width: 84px;
      height: 24px;
      content: "";
      background: #ffffff;
      box-shadow:
        12px -12px 0 #ffffff,
        24px -12px 0 #ffffff,
        36px 0 0 #ffffff,
        48px 0 0 #ffffff,
        60px 12px 0 #ffffff;
      opacity: 0.86;
    }

    #menu::after {
      position: absolute;
      right: 0;
      bottom: 0;
      left: 0;
      z-index: 0;
      height: 38%;
      content: "";
      background: #62c457;
      box-shadow: inset 0 6px 0 rgba(31, 120, 49, 0.32), inset 0 12px 0 rgba(137, 220, 113, 0.35);
    }

    .menu-scene {
      position: absolute;
      right: 0;
      bottom: 0;
      left: 0;
      z-index: 1;
      height: 38%;
      overflow: hidden;
      pointer-events: none;
      background: url("grass-preview.png") repeat;
      background-size: 12px 12px;
      animation: grass-scroll 2.4s steps(12, end) infinite;
    }

    .menu-cloud {
      position: absolute;
      z-index: 0;
      width: 92px;
      height: 20px;
      background: #ffffff;
      box-shadow: 12px -10px 0 #ffffff, 24px -10px 0 #ffffff, 36px 0 0 #ffffff;
      opacity: 0.72;
      pointer-events: none;
    }

    .menu-cloud.cloud-two { top: 23%; right: 13%; transform: scale(0.72); }

    @keyframes grass-scroll {
      from { background-position: 0 0; }
      to { background-position: -96px 0; }
    }

    .menu-character {
      position: absolute;
      bottom: 14%;
      left: 50%;
      width: 48px;
      height: 62px;
      image-rendering: pixelated;
      transform: translateX(-50%);
      animation: menu-bob 720ms steps(2, end) infinite alternate;
    }

    .menu-player-shadow {
      position: absolute;
      bottom: 0;
      left: 3px;
      width: 42px;
      height: 8px;
      background: rgba(34, 101, 40, 0.36);
      border-radius: 50%;
    }

    .menu-player {
      position: absolute;
      bottom: 7px;
      left: 0;
      width: 48px;
      height: 48px;
      background: url("player-preview.png") center / 48px 48px no-repeat;
      image-rendering: pixelated;
    }

    @keyframes menu-bob {
      from { transform: translateX(-50%) translateY(0); }
      to { transform: translateX(-50%) translateY(-6px); }
    }

    #menu.hidden {
      visibility: hidden;
      pointer-events: none;
      opacity: 0;
    }

    .menu-card {
      position: relative;
      z-index: 2;
      width: min(500px, 90vw);
      border: 4px solid #203c25;
      padding: 34px 34px 30px;
      background: var(--panel);
      box-shadow:
        0 8px 0 rgba(15, 31, 19, 0.8),
        inset 0 0 0 3px rgba(169, 216, 110, 0.18),
        inset 0 10px 0 rgba(255, 243, 191, 0.04);
      text-align: center;
    }

    .menu-kicker {
      margin-bottom: 14px;
      color: var(--accent);
      font-size: 12px;
      letter-spacing: 0.18em;
    }

    .menu-card h1 {
      margin: 0;
      color: var(--ink);
      font-size: clamp(38px, 8vw, 68px);
      font-weight: 400;
      line-height: 1;
      letter-spacing: 0.08em;
      text-shadow: 4px 4px 0 #25492a;
    }

    .menu-subtitle {
      margin: 12px 0 18px;
      color: var(--muted);
      font-size: 18px;
      letter-spacing: 0.26em;
    }

    .menu-description {
      max-width: 360px;
      margin: 0 auto 22px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.7;
      letter-spacing: 0.04em;
    }

    .menu-tags {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin: 0 auto 24px;
    }

    .menu-tag {
      border: 2px solid rgba(169, 216, 110, 0.48);
      padding: 6px 10px 4px;
      color: #e3efbd;
      background: rgba(62, 107, 57, 0.55);
      font-size: 12px;
    }

    .pixel-button {
      min-width: 190px;
      border: 3px solid #19351f;
      padding: 13px 28px 11px;
      background: var(--accent);
      color: #20321f;
      font-size: 22px;
      cursor: pointer;
      box-shadow:
        0 5px 0 #876f30,
        inset 0 0 0 2px rgba(255, 251, 194, 0.62);
    }

    .pixel-button:hover {
      transform: translateY(-2px);
      box-shadow:
        0 7px 0 #876f30,
        inset 0 0 0 2px rgba(255, 251, 194, 0.62);
    }

    .pixel-button:active {
      transform: translateY(4px);
      box-shadow:
        0 1px 0 #876f30,
        inset 0 0 0 2px rgba(255, 251, 194, 0.62);
    }

    .controls {
      margin-top: 22px;
      color: #d7e8c2;
      font-size: 13px;
      line-height: 1.8;
    }

    .menu-tip {
      margin-top: 12px;
      color: #9fbd8c;
      font-size: 11px;
      letter-spacing: 0.08em;
    }

    #loading {
      z-index: 5;
      visibility: hidden;
      gap: 14px;
      align-content: center;
      background: #1d2c20;
      text-align: center;
      opacity: 0;
      transition: opacity 180ms steps(3, end);
    }

    #loading.active {
      visibility: visible;
      opacity: 1;
    }

    #loading.done {
      visibility: hidden;
      pointer-events: none;
      opacity: 0;
    }

    .loading-title {
      font-size: 26px;
      letter-spacing: 0.14em;
    }

    .track {
      overflow: hidden;
      width: min(330px, 72vw);
      height: 10px;
      border: 3px solid #101b13;
      background: #344d36;
    }

    #progress {
      width: 0;
      height: 100%;
      background: var(--accent);
      transition: width 100ms steps(10, end);
    }

    #status {
      color: var(--muted);
      font-size: 13px;
    }

    #fullscreen {
      position: absolute;
      top: max(12px, env(safe-area-inset-top));
      right: max(12px, env(safe-area-inset-right));
      z-index: 4;
      border: 3px solid #172719;
      padding: 8px 12px 6px;
      background: rgba(36, 58, 39, 0.9);
      color: var(--ink);
      font-size: 14px;
      cursor: pointer;
    }

    #banner {
      position: absolute;
      top: 14px;
      left: 50%;
      z-index: 8;
      display: none;
      max-width: min(560px, 88vw);
      transform: translateX(-50%);
      border: 3px solid #793e3e;
      padding: 10px 14px;
      background: #4f2929;
      color: #ffd5c7;
      font-size: 13px;
      text-align: center;
    }

    @media (max-width: 600px) {
      .menu-card {
        padding: 34px 18px 26px;
      }

      .menu-card h1 {
        font-size: clamp(34px, 12vw, 52px);
      }

      .menu-subtitle {
        font-size: 15px;
      }

      .controls {
        font-size: 11px;
      }
    }
  </style>
</head>
<body>
  <main id="game-shell">
    <canvas id="unity-canvas" tabindex="-1"></canvas>

    <section id="menu" aria-label="主界面">
      <div class="menu-cloud cloud-two" aria-hidden="true"></div>
      <div class="menu-scene" aria-hidden="true">
        <div class="menu-character">
          <div class="menu-player-shadow"></div>
          <div class="menu-player"></div>
        </div>
      </div>
      <div class="menu-card">
        <div class="menu-kicker">12×12 PIXEL WORLD</div>
        <h1>种植建造</h1>
        <div class="menu-subtitle">像素世界</div>
        <p class="menu-description">种下第一颗种子，<br>把一片土地变成你的家。</p>
        <div class="menu-tags" aria-label="游戏特色">
          <span class="menu-tag">种植</span>
          <span class="menu-tag">建造</span>
          <span class="menu-tag">探索</span>
        </div>
        <button id="start-game" class="pixel-button" type="button">开始游戏</button>
        <div class="controls">方向键 / WASD 移动　·　R 返回</div>
        <div class="menu-tip">一个由像素素材组成的小世界</div>
      </div>
    </section>

    <section id="loading" aria-live="polite">
      <div class="loading-title">载入世界</div>
      <div class="track"><div id="progress"></div></div>
      <div id="status">准备中…</div>
    </section>

    <button id="fullscreen" type="button">全屏</button>
    <div id="banner" role="alert"></div>
  </main>

  <script>
    const gameShell = document.querySelector("#game-shell");
    const canvas = document.querySelector("#unity-canvas");
    const menu = document.querySelector("#menu");
    const startGame = document.querySelector("#start-game");
    const loading = document.querySelector("#loading");
    const progress = document.querySelector("#progress");
    const status = document.querySelector("#status");
    const banner = document.querySelector("#banner");
    const fullscreen = document.querySelector("#fullscreen");

    // 每次发布都更换版本号，避免 UnityCache/浏览器继续使用旧的同名构建文件。
    const buildUrl = "Build";
    const buildVersion = "20260723-mainmenu3";
    const assetUrl = file => buildUrl + "/" + file + "?v=" + buildVersion;
    const loaderUrl = assetUrl("{{{ LOADER_FILENAME }}}");
    const config = {
      arguments: [],
      dataUrl: assetUrl("{{{ DATA_FILENAME }}}"),
      frameworkUrl: assetUrl("{{{ FRAMEWORK_FILENAME }}}"),
      codeUrl: assetUrl("{{{ CODE_FILENAME }}}"),
      streamingAssetsUrl: "StreamingAssets",
      companyName: {{{ JSON.stringify(COMPANY_NAME) }}},
      productName: {{{ JSON.stringify(PRODUCT_NAME) }}},
      productVersion: {{{ JSON.stringify(PRODUCT_VERSION) }}},
      devicePixelRatio: Math.min(window.devicePixelRatio || 1, 2),
      showBanner(message, type) {
        banner.textContent = message;
        banner.style.display = "block";
        if (type !== "error") setTimeout(() => banner.style.display = "none", 5000);
      }
    };

    let unityInstance;
    let bootStarted = false;

    function bootGame() {
      if (bootStarted) return;
      bootStarted = true;
      loading.classList.add("active");

      const loader = document.createElement("script");
      loader.src = loaderUrl;
      loader.onload = () => {
        createUnityInstance(canvas, config, value => {
          const percent = Math.round(value * 100);
          progress.style.width = percent + "%";
          status.textContent = "载入 " + percent + "%";
        }).then(instance => {
          unityInstance = instance;
          loading.classList.add("done");
          canvas.focus();
        }).catch(message => {
          banner.textContent = message;
          banner.style.display = "block";
          status.textContent = "载入失败";
        });
      };
      loader.onerror = () => {
        banner.textContent = "载入失败，请刷新重试";
        banner.style.display = "block";
        status.textContent = "载入失败";
      };
      document.body.appendChild(loader);
    }

    startGame.addEventListener("click", () => {
      menu.classList.add("hidden");
      document.documentElement.requestFullscreen?.().catch(() => {});
      bootGame();
    });

    canvas.addEventListener("pointerdown", () => canvas.focus());
    canvas.addEventListener("contextmenu", event => event.preventDefault());

    fullscreen.addEventListener("click", () => {
      if (document.fullscreenElement) {
        document.exitFullscreen?.();
      } else if (document.documentElement.requestFullscreen) {
        document.documentElement.requestFullscreen().catch(() => {});
      } else {
        unityInstance?.SetFullscreen(1);
      }
    });

    document.addEventListener("fullscreenchange", () => {
      fullscreen.textContent = document.fullscreenElement ? "退出全屏" : "全屏";
    });
  </script>
</body>
</html>
