<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#172219">
  <meta name="description" content="种植建造像素游戏">
  <title>Zhong Zhi Jian Zao · 种植建造</title>
  <style>
    @font-face {
      font-family: "Ark Pixel";
      src: url("Fonts/ark-pixel-12px.ttf") format("truetype");
      font-display: swap;
    }

    :root {
      color-scheme: dark;
      --ink: #fff3bf;
      --muted: #d8e8c2;
      --panel: rgba(27, 43, 29, 0.94);
      --line: #a9d86e;
      --accent: #f2d36f;
      --shadow: #142118;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #172219;
      color: var(--ink);
      font-family: "Ark Pixel", "PingFang SC", "Microsoft YaHei", sans-serif;
      font-synthesis: none;
      -webkit-font-smoothing: none;
      -moz-osx-font-smoothing: grayscale;
    }

    button {
      font: inherit;
    }

    #game-shell {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      background: #263529;
    }

    #unity-canvas {
      display: block;
      width: 100%;
      height: 100%;
      background: #263529;
      outline: none;
      image-rendering: pixelated;
    }

    #menu,
    #loading {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    #menu {
      z-index: 6;
      background:
        linear-gradient(rgba(18, 38, 23, 0.26), rgba(18, 38, 23, 0.72)),
        repeating-linear-gradient(
          0deg,
          #4bcf42 0,
          #4bcf42 12px,
          #47c83f 12px,
          #47c83f 24px
        );
      transition: opacity 180ms steps(3, end);
    }

    #menu::after {
      position: absolute;
      right: 0;
      bottom: 0;
      left: 0;
      height: 22%;
      content: "";
      background:
        repeating-linear-gradient(
          90deg,
          rgba(151, 243, 225, 0.18) 0,
          rgba(151, 243, 225, 0.18) 18px,
          transparent 18px,
          transparent 34px
        ),
        #65dfce;
      box-shadow: inset 0 6px 0 rgba(27, 122, 111, 0.2);
    }

    #menu.hidden {
      visibility: hidden;
      pointer-events: none;
      opacity: 0;
    }

    .menu-card {
      position: relative;
      z-index: 1;
      width: min(440px, 88vw);
      border: 4px solid #203c25;
      padding: 42px 30px 32px;
      background: var(--panel);
      box-shadow:
        0 8px 0 rgba(15, 31, 19, 0.8),
        inset 0 0 0 3px rgba(169, 216, 110, 0.18);
      text-align: center;
    }

    .menu-card h1 {
      margin: 0;
      color: var(--ink);
      font-size: clamp(38px, 8vw, 68px);
      font-weight: 400;
      line-height: 1;
      letter-spacing: 0.08em;
      text-shadow: 4px 4px 0 #25492a;
    }

    .menu-subtitle {
      margin: 16px 0 30px;
      color: var(--muted);
      font-size: 18px;
      letter-spacing: 0.26em;
    }

    .menu-description {
      max-width: 330px;
      margin: -12px auto 28px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.8;
      letter-spacing: 0.04em;
    }

    .pixel-button {
      min-width: 190px;
      border: 3px solid #19351f;
      padding: 13px 28px 11px;
      background: var(--accent);
      color: #20321f;
      font-size: 22px;
      cursor: pointer;
      box-shadow:
        0 5px 0 #876f30,
        inset 0 0 0 2px rgba(255, 251, 194, 0.62);
    }

    .pixel-button:hover {
      transform: translateY(-2px);
      box-shadow:
        0 7px 0 #876f30,
        inset 0 0 0 2px rgba(255, 251, 194, 0.62);
    }

    .pixel-button:active {
      transform: translateY(4px);
      box-shadow:
        0 1px 0 #876f30,
        inset 0 0 0 2px rgba(255, 251, 194, 0.62);
    }

    .controls {
      margin-top: 26px;
      color: #d7e8c2;
      font-size: 13px;
      line-height: 1.8;
    }

    #loading {
      z-index: 5;
      visibility: hidden;
      gap: 14px;
      align-content: center;
      background: #1d2c20;
      text-align: center;
      opacity: 0;
      transition: opacity 180ms steps(3, end);
    }

    #loading.active {
      visibility: visible;
      opacity: 1;
    }

    #loading.done {
      visibility: hidden;
      pointer-events: none;
      opacity: 0;
    }

    .loading-title {
      font-size: 26px;
      letter-spacing: 0.14em;
    }

    .track {
      overflow: hidden;
      width: min(330px, 72vw);
      height: 10px;
      border: 3px solid #101b13;
      background: #344d36;
    }

    #progress {
      width: 0;
      height: 100%;
      background: var(--accent);
      transition: width 100ms steps(10, end);
    }

    #status {
      color: var(--muted);
      font-size: 13px;
    }

    #fullscreen {
      position: absolute;
      top: max(12px, env(safe-area-inset-top));
      right: max(12px, env(safe-area-inset-right));
      z-index: 4;
      border: 3px solid #172719;
      padding: 8px 12px 6px;
      background: rgba(36, 58, 39, 0.9);
      color: var(--ink);
      font-size: 14px;
      cursor: pointer;
    }

    #banner {
      position: absolute;
      top: 14px;
      left: 50%;
      z-index: 8;
      display: none;
      max-width: min(560px, 88vw);
      transform: translateX(-50%);
      border: 3px solid #793e3e;
      padding: 10px 14px;
      background: #4f2929;
      color: #ffd5c7;
      font-size: 13px;
      text-align: center;
    }

    @media (max-width: 600px) {
      .menu-card {
        padding: 34px 18px 26px;
      }

      .menu-card h1 {
        font-size: clamp(34px, 12vw, 52px);
      }

      .menu-subtitle {
        font-size: 15px;
      }

      .controls {
        font-size: 11px;
      }
    }
  </style>
</head>
<body>
  <main id="game-shell">
    <canvas id="unity-canvas" tabindex="-1"></canvas>

    <section id="menu" aria-label="主界面">
      <div class="menu-card">
        <h1>种植建造</h1>
        <div class="menu-subtitle">像素世界</div>
        <p class="menu-description">一片由你的像素素材生成的大世界。<br>先四处走走，寻找湖泊、石地与花草。</p>
        <button id="start-game" class="pixel-button" type="button">开始游戏</button>
        <div class="controls">方向键 / WASD 移动　·　右键 互动　·　R 返回</div>
      </div>
    </section>

    <section id="loading" aria-live="polite">
      <div class="loading-title">载入世界</div>
      <div class="track"><div id="progress"></div></div>
      <div id="status">准备中…</div>
    </section>

    <button id="fullscreen" type="button">全屏</button>
    <div id="banner" role="alert"></div>
  </main>

  <script>
    const gameShell = document.querySelector("#game-shell");
    const canvas = document.querySelector("#unity-canvas");
    const menu = document.querySelector("#menu");
    const startGame = document.querySelector("#start-game");
    const loading = document.querySelector("#loading");
    const progress = document.querySelector("#progress");
    const status = document.querySelector("#status");
    const banner = document.querySelector("#banner");
    const fullscreen = document.querySelector("#fullscreen");

    const buildUrl = "Build";
    const loaderUrl = buildUrl + "/{{{ LOADER_FILENAME }}}";
    const config = {
      arguments: [],
      dataUrl: buildUrl + "/{{{ DATA_FILENAME }}}",
      frameworkUrl: buildUrl + "/{{{ FRAMEWORK_FILENAME }}}",
      codeUrl: buildUrl + "/{{{ CODE_FILENAME }}}",
      streamingAssetsUrl: "StreamingAssets",
      companyName: {{{ JSON.stringify(COMPANY_NAME) }}},
      productName: {{{ JSON.stringify(PRODUCT_NAME) }}},
      productVersion: {{{ JSON.stringify(PRODUCT_VERSION) }}},
      devicePixelRatio: Math.min(window.devicePixelRatio || 1, 2),
      showBanner(message, type) {
        banner.textContent = message;
        banner.style.display = "block";
        if (type !== "error") setTimeout(() => banner.style.display = "none", 5000);
      }
    };

    let unityInstance;
    let bootStarted = false;

    function bootGame() {
      if (bootStarted) return;
      bootStarted = true;
      loading.classList.add("active");

      const loader = document.createElement("script");
      loader.src = loaderUrl;
      loader.onload = () => {
        createUnityInstance(canvas, config, value => {
          const percent = Math.round(value * 100);
          progress.style.width = percent + "%";
          status.textContent = "载入 " + percent + "%";
        }).then(instance => {
          unityInstance = instance;
          loading.classList.add("done");
          canvas.focus();
        }).catch(message => {
          banner.textContent = message;
          banner.style.display = "block";
          status.textContent = "载入失败";
        });
      };
      loader.onerror = () => {
        banner.textContent = "载入失败，请刷新重试";
        banner.style.display = "block";
        status.textContent = "载入失败";
      };
      document.body.appendChild(loader);
    }

    startGame.addEventListener("click", () => {
      menu.classList.add("hidden");
      document.documentElement.requestFullscreen?.().catch(() => {});
      bootGame();
    });

    canvas.addEventListener("pointerdown", () => canvas.focus());
    canvas.addEventListener("contextmenu", event => event.preventDefault());

    fullscreen.addEventListener("click", () => {
      if (document.fullscreenElement) {
        document.exitFullscreen?.();
      } else if (document.documentElement.requestFullscreen) {
        document.documentElement.requestFullscreen().catch(() => {});
      } else {
        unityInstance?.SetFullscreen(1);
      }
    });

    document.addEventListener("fullscreenchange", () => {
      fullscreen.textContent = document.fullscreenElement ? "退出全屏" : "全屏";
    });
  </script>
</body>
</html>
